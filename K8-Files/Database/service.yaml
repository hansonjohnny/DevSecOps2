# ─────────────────────────────────────────
# SERVICE — POSTGRESQL
# ClusterIP — only reachable inside cluster
# ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: three-tier
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432